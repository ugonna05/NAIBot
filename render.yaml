services:
  - type: web
    name: naibot-api
    runtime: python
    plan: starter          # upgrade to standard/professional for 8B models
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: MODEL_PATH
        value: /opt/render/project/src/models
      - key: ALLOWED_ORIGINS
        value: "*"            # replace with your frontend domain in production
      - key: HF_TOKEN
        sync: false           # set this manually in the Render dashboard
    disk:
      name: model-storage
      mountPath: /opt/render/project/src/models
      sizeGB: 20             # adjust to fit your model (8B ≈ 16GB quantized)
